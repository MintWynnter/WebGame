<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>P2P Multiplayer Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- Include PeerJS Library -->
    <script src="https://unpkg.com"></script>
</head>
<body>
    <div id="lobby">
        <h2>P2P Game Lobby</h2>
        <div id="host-section">
            <button id="btn-host">Host a Game</button>
            <p>Your Game ID: <strong id="display-id">...</strong></p>
        </div>
        <hr>
        <div id="join-section">
            <input type="text" id="input-peer-id" placeholder="Enter Host Game ID">
            <button id="btn-join">Join Game</button>
        </div>
    </div>

    <div id="game-stage" style="display:none;">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <p id="status-msg">Connecting to peer...</p>
    </div>

    <script src="src/game.js"></script>
</body>
